<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define Gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0288d1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26c6da;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Node 1 -->
  <rect x="20" y="60" width="130" height="60" rx="10" fill="url(#grad1)" stroke="#01579b" stroke-width="2"/>
  <text x="85" y="95" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">概念發想</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="90" x2="180" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 2 -->
  <rect x="180" y="60" width="130" height="60" rx="10" fill="url(#grad1)" stroke="#01579b" stroke-width="2"/>
  <text x="245" y="95" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">可行性評估</text>

  <!-- Arrow 2 -->
  <line x1="310" y1="90" x2="340" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 3 -->
  <rect x="340" y="60" width="130" height="60" rx="10" fill="url(#grad1)" stroke="#01579b" stroke-width="2"/>
  <text x="405" y="95" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">產品開發</text>

  <!-- Arrow 3 -->
  <line x1="470" y1="90" x2="500" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 4 -->
  <rect x="500" y="60" width="130" height="60" rx="10" fill="url(#grad1)" stroke="#01579b" stroke-width="2"/>
  <text x="565" y="95" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">測試與驗證</text>

  <!-- Arrow 4 -->
  <line x1="630" y1="90" x2="660" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 5 -->
  <rect x="660" y="60" width="120" height="60" rx="10" fill="#f57c00" stroke="#e65100" stroke-width="2"/>
  <text x="720" y="95" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">正式上市</text>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
</svg>
