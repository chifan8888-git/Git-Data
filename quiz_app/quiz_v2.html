<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 應用規劃師 模擬測驗系統</title>
    <style>
:root {
    --bg-color: #05070a;
    --card-bg: rgba(20, 25, 35, 0.7);
    --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    --accent-color: #f43f5e;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --glass-border: rgba(255, 255, 255, 0.1);
    --correct-color: #10b981;
    --wrong-color: #ef4444;
    --font-main: 'Inter', -apple-system, sans-serif;
    --font-heading: 'Outfit', sans-serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    font-family: var(--font-main);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Background Decoration */
.background-decor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
}

.glow {
    position: absolute;
    width: 50vw;
    height: 50vw;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    pointer-events: none;
}

.glow-1 {
    background: #6366f1;
    top: -10%;
    left: -10%;
}

.glow-2 {
    background: #a855f7;
    bottom: -10%;
    right: -10%;
}

/* Container & Cards */
.container {
    width: 90%;
    max-width: 800px;
    position: relative;
    z-index: 1;
}

.card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    display: none;
    animation: fadeIn 0.5s ease-out forwards;
}

.card.active {
    display: block;
}

.large-card.active {
    max-width: 900px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Typography */
.premium-title {
    font-family: var(--font-heading);
    font-size: 3rem;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 16px;
    text-align: center;
}

.highlight {
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-size: 1.1rem;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 32px;
}

/* Buttons */
.btn {
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: none;
    font-family: var(--font-main);
    display: inline-block;
    text-align: center;
}

.primary-btn {
    background: var(--primary-gradient);
    color: white;
    box-shadow: 0 10px 15px -3px rgba(168, 85, 247, 0.4);
}

.primary-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 25px -5px rgba(168, 85, 247, 0.5);
}

.secondary-btn {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    border: 1px solid var(--glass-border);
}

.secondary-btn:hover {
    background: rgba(255, 255, 255, 0.1);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
}

/* Info Grid */
.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
}

.info-item {
    background: rgba(255, 255, 255, 0.03);
    padding: 16px;
    border-radius: 16px;
    text-align: center;
}

.info-label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.info-value {
    font-size: 1.25rem;
    font-weight: 700;
}

/* Quiz UI */
.quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.badge {
    background: rgba(99, 102, 241, 0.2);
    color: #818cf8;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
}

.progress-bar-container {
    height: 6px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 3px;
    margin-bottom: 32px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: var(--primary-gradient);
    width: 0%;
    transition: width 0.4s ease;
}

.question {
    font-size: 1.4rem;
    line-height: 1.5;
    margin-bottom: 32px;
    font-weight: 600;
}

.options-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.option-btn {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    padding: 16px 20px;
    border-radius: 12px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
}

.option-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.3);
}

.option-btn.selected {
    background: rgba(99, 102, 241, 0.1);
    border-color: #6366f1;
    box-shadow: 0 0 0 1px #6366f1;
}

.option-letter {
    width: 28px;
    height: 28px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    flex-shrink: 0;
}

.quiz-footer {
    margin-top: 40px;
    display: flex;
    justify-content: flex-end;
}

/* Results */
.score-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: var(--primary-gradient);
    margin: 32px auto;
    padding: 4px;
    box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
}

.score-inner {
    width: 100%;
    height: 100%;
    background: var(--bg-color);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#final-score {
    font-size: 3.5rem;
    font-weight: 800;
    font-family: var(--font-heading);
}

.score-total {
    color: var(--text-secondary);
    font-size: 1.1rem;
}

.feedback {
    text-align: center;
    font-size: 1.25rem;
    margin-bottom: 40px;
}

.result-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
}

.category-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
}

.stat-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    padding: 20px;
    border-radius: 16px;
    transition: transform 0.3s ease;
}

.stat-item:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.05);
}

.stat-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.stat-name {
    font-size: 0.9rem;
    color: var(--text-secondary);
    font-weight: 500;
}

.stat-percentage {
    font-size: 1.1rem;
    font-weight: 700;
    color: #818cf8;
}

.stat-bar-bg {
    height: 8px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 4px;
    overflow: hidden;
}

.stat-bar {
    height: 100%;
    background: var(--primary-gradient);
    width: 0%;
    transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 4px;
}

/* Review List */
.review-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--glass-border);
}

.close-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 2rem;
    cursor: pointer;
}

.review-list {
    overflow-y: auto;
    flex-grow: 1;
    padding-right: 8px;
}

.review-item {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 16px;
    margin-bottom: 20px;
    padding: 24px;
    border: 1px solid var(--glass-border);
}

.review-q-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
}

.review-q-text {
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 16px;
}

.review-status {
    font-weight: 700;
    font-size: 0.9rem;
}

.review-status.correct { color: var(--correct-color); }
.review-status.wrong { color: var(--wrong-color); }

.review-ans-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
}

.ans-box {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
}

.ans-label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 4px;
}

.ans-correct { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); }
.ans-user { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); }
.ans-user.wrong { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }

.explanation-box {
    background: rgba(99, 102, 241, 0.05);
    padding: 16px;
    border-radius: 8px;
    font-size: 0.95rem;
    line-height: 1.5;
    color: #cbd5e1;
    border-left: 4px solid #6366f1;
}

/* Scrollbar */
.review-list::-webkit-scrollbar { width: 6px; }
.review-list::-webkit-scrollbar-track { background: transparent; }
.review-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }

/* Responsive */
@media (max-width: 600px) {
    .premium-title { font-size: 2rem; }
    .card { padding: 24px; }
    .info-grid { grid-template-columns: 1fr; }
    .result-actions { flex-direction: column; }
    .category-stats { grid-template-columns: 1fr; }
    .review-ans-grid { grid-template-columns: 1fr; }
}

</style>

</head>
<body>
    <div class="background-decor">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>

    <main class="container">
        <!-- 開始畫面 -->
        <section id="start-screen" class="card active">
            <h1 class="premium-title">AI 應用規劃師<br><span class="highlight">模擬測驗系統</span></h1>
            <p class="subtitle">包含「人工智慧基礎概論」與「生成式 AI 應用與規劃」等核心科目，目前共收錄 <span id="total-questions-text" class="highlight-mini">---</span> 題專業題庫。包含 50 題基礎概論與 50 題生成式 AI 應用，共 100 題，測試您的實力！</p>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">測驗題數</span>

                    <span id="total-questions-count" class="info-value">--- 題</span>

            <button id="start-btn" class="btn primary-btn">開始測驗</button>
        </section>

        <!-- 測驗畫面 -->
        <section id="quiz-screen" class="card">
            <div class="quiz-header">
                <span id="category-badge" class="badge">人工智慧基礎概論</span>
                <span id="progress-text">題目 1 / 100</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <h2 id="question-text" class="question">載入中...</h2>
            <div id="options-container" class="options-grid">
                <!-- 選項會在此動態生成 -->
            </div>
            <div class="quiz-footer">
                <button id="next-btn" class="btn secondary-btn" disabled>下一題</button>
            </div>
        </section>

        <!-- 結果畫面 -->
        <section id="result-screen" class="card">
            <h2 class="result-title">測驗完成！</h2>
            <div class="score-circle">
                <div class="score-inner">
                    <span id="final-score">0</span>
                    <span class="score-total">/ 100</span>
                </div>
            </div>
            <p id="result-feedback" class="feedback">不錯的表現！</p>
            
            <div class="category-stats">
                <div class="stat-item">
                    <div class="stat-info">
                        <span class="stat-name">人工智慧基礎概論</span>
                        <span id="stat-value-1" class="stat-percentage">0%</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div id="stat-bar-1" class="stat-bar"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-info">
                        <span class="stat-name">生成式 AI 應用與規劃</span>
                        <span id="stat-value-2" class="stat-percentage">0%</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div id="stat-bar-2" class="stat-bar"></div>
                    </div>
                </div>
            </div>

            <div class="result-actions">
                <button id="restart-btn" class="btn secondary-btn">重新測驗</button>
                <button id="review-btn" class="btn primary-btn">檢討錯誤</button>
            </div>
        </section>

        <!-- 檢討畫面 -->
        <section id="review-screen" class="card large-card">
            <div class="review-header">
                <h2>題目檢討</h2>
                <button id="back-to-result" class="close-btn">&times;</button>
            </div>
            <div id="review-container" class="review-list">
                <!-- 檢討列表 -->
            </div>
        </section>
    </main>

    
    
<script>
window.QUIZ_QUESTIONS = [
  {
    "id": 1,
    "category": "人工智慧基礎概論",

let QUESTIONS_DATA = [];
let testQuestions = [];
let currentQuestionIndex = 0;
let userAnswers = [];

let TOTAL_QUESTIONS_PER_TEST = 100;

const startScreen = document.getElementById('start-screen');
const quizScreen = document.getElementById('quiz-screen');
const resultScreen = document.getElementById('result-screen');
const reviewScreen = document.getElementById('review-screen');

const startBtn = document.getElementById('start-btn');
const nextBtn = document.getElementById('next-btn');
const restartBtn = document.getElementById('restart-btn');
const reviewBtn = document.getElementById('review-btn');
const backToResultBtn = document.getElementById('back-to-result');

const questionText = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const categoryBadge = document.getElementById('category-badge');
const progressText = document.getElementById('progress-text');
const progressBar = document.getElementById('progress-bar');

const finalScoreElement = document.getElementById('final-score');
const feedbackElement = document.getElementById('result-feedback');
const reviewContainer = document.getElementById('review-container');

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startQuiz() {
    if (QUESTIONS_DATA.length === 0) {
        alert('題庫載入中，請稍候...');
        return;
    }
    testQuestions = [...QUESTIONS_DATA]; // 直接使用預先排列好的 100 題
    currentQuestionIndex = 0;
    userAnswers = new Array(TOTAL_QUESTIONS_PER_TEST).fill(null);
    
    // 重置科目統計條
    document.getElementById('stat-bar-1').style.width = '0%';
    document.getElementById('stat-bar-2').style.width = '0%';
    
    showScreen(quizScreen);
    updateQuestion();
}

function updateQuestion() {
    const q = testQuestions[currentQuestionIndex];
    categoryBadge.innerText = q.category;
    questionText.innerText = q.question;
    progressText.innerText = `題目 ${currentQuestionIndex + 1} / ${TOTAL_QUESTIONS_PER_TEST}`;
    progressBar.style.width = `${((currentQuestionIndex + 1) / TOTAL_QUESTIONS_PER_TEST) * 100}%`;
    
    optionsContainer.innerHTML = '';
    q.options.forEach((opt, index) => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        if (userAnswers[currentQuestionIndex] === index) btn.classList.add('selected');
        btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + index)}</span><span class="option-text">${opt}</span>`;
        btn.onclick = () => selectOption(index);
        optionsContainer.appendChild(btn);
    });
    
    nextBtn.innerText = currentQuestionIndex === TOTAL_QUESTIONS_PER_TEST - 1 ? '提交測驗' : '下一題';
    nextBtn.disabled = userAnswers[currentQuestionIndex] === null;
}

function selectOption(index) {
    userAnswers[currentQuestionIndex] = index;
    const buttons = optionsContainer.querySelectorAll('.option-btn');
    buttons.forEach((b, i) => i === index ? b.classList.add('selected') : b.classList.remove('selected'));
    nextBtn.disabled = false;
}

function nextQuestion() {
    if (currentQuestionIndex < TOTAL_QUESTIONS_PER_TEST - 1) {
        currentQuestionIndex++;
        updateQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    let score = 0;
    
    // 初始化科目計分器
    const cat1 = { name: "人工智慧基礎概論", correct: 0, total: 0 };
    const cat2 = { name: "生成式 AI 應用與規劃", correct: 0, total: 0 };

    testQuestions.forEach((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        if (isCorrect) score++;
        
        // 累加科目統計
        if (q.category === cat1.name) {
            cat1.total++;
            if (isCorrect) cat1.correct++;
        } else if (q.category === cat2.name) {
            cat2.total++;
            if (isCorrect) cat2.correct++;
        }
    });

    const finalPercent = Math.round((score / TOTAL_QUESTIONS_PER_TEST) * 100);
    finalScoreElement.innerText = finalPercent;
    feedbackElement.innerText = finalPercent >= 80 ? "太棒了！" : (finalPercent >= 60 ? "不錯哦！" : "再加油！");
    
    // 更新科目統計顯示
    const updateStat = (id, cat) => {
        const percent = cat.total > 0 ? Math.round((cat.correct / cat.total) * 100) : 0;
        document.getElementById(`stat-value-${id}`).innerText = `${percent}%`;
        // 使用 setTimeout 確保動畫能在畫面切換後觸發
        setTimeout(() => {
            document.getElementById(`stat-bar-${id}`).style.width = `${percent}%`;
        }, 100);
    };

    updateStat(1, cat1);
    updateStat(2, cat2);

    showScreen(resultScreen);
}

function showReview() {
    reviewContainer.innerHTML = '';
    testQuestions.forEach((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        const item = document.createElement('div');
        item.className = 'review-item';
        item.innerHTML = `
            <div class="review-q-header"><span class="badge">${q.category}</span><span class="review-status ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ 答對' : '✗ 答錯'}</span></div>
            <p class="review-q-text">${i + 1}. ${q.question}</p>
            <div class="review-ans-grid">
                <div class="ans-box ans-correct"><span class="ans-label">正確答案</span>${String.fromCharCode(65 + q.answer)}. ${q.options[q.answer]}</div>
                <div class="ans-box ans-user ${isCorrect ? '' : 'wrong'}"><span class="ans-label">您的選擇</span>${userAnswers[i] !== null ? String.fromCharCode(65 + userAnswers[i]) + '. ' + q.options[userAnswers[i]] : '未作答'}</div>
            </div>
            <div class="explanation-box"><strong>解析：</strong> ${q.explanation}</div>
        `;
        reviewContainer.appendChild(item);
    });
    showScreen(reviewScreen);
}

function showScreen(screen) {
    [startScreen, quizScreen, resultScreen, reviewScreen].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
}

startBtn.onclick = startQuiz;
nextBtn.onclick = nextQuestion;
restartBtn.onclick = startQuiz;
reviewBtn.onclick = showReview;
backToResultBtn.onclick = () => showScreen(resultScreen);


async function init() {
    try {
        const rawQuestions = window.QUIZ_QUESTIONS || [];
        
        if (rawQuestions.length === 0) {
            console.error('題庫載入失敗：window.QUIZ_QUESTIONS 為空。');
            alert('題庫載入失敗，請確認檔案完整性。');
            return;
        }

        // 分類選取邏輯: 50 題「人工智慧基礎概論」+ 50 題「生成式 AI 應用與規劃」
        const cat1 = rawQuestions.filter(q => q.category === "人工智慧基礎概論");
        const cat2 = rawQuestions.filter(q => q.category === "生成式 AI 應用與規劃");

        // 隨機選取 50 題 (若不足則取全部)
        const selectedCat1 = shuffle([...cat1]).slice(0, 50);
        const selectedCat2 = shuffle([...cat2]).slice(0, 50);

        // 合併並再次隨機排序
        QUESTIONS_DATA = shuffle([...selectedCat1, ...selectedCat2]);

        const totalText = document.getElementById('total-questions-text');
        const totalCountDisplay = document.getElementById('total-questions-count');
        
        // 更新 UI 中的總題數文字
        TOTAL_QUESTIONS_PER_TEST = QUESTIONS_DATA.length;
        if (totalText) totalText.innerText = TOTAL_QUESTIONS_PER_TEST;
        if (totalCountDisplay) totalCountDisplay.innerText = `${TOTAL_QUESTIONS_PER_TEST} 題`;
        
        // 動態更新界面上的 100 數字（如果存在）
        const progressTotal = document.getElementById('progress-text');
        if (progressTotal) progressTotal.innerText = `題目 1 / ${TOTAL_QUESTIONS_PER_TEST}`;
        
        const scoreTotal = document.querySelector('.score-total');
        if (scoreTotal) scoreTotal.innerText = `/ ${TOTAL_QUESTIONS_PER_TEST}`;

        console.log(`測驗系統初始化完成。總原始題庫：${rawQuestions.length}，本次選取：${QUESTIONS_DATA.length} 題。`);
    } catch (error) {
        console.error('初始化失敗：', error);
        alert('系統初始化失敗。');
    }
}

init();
</script>
